# ============================================================
# 💬 AI Melli — Chat via GitHub Actions
# ============================================================

name: "💬 AI Chat"

on:
  workflow_dispatch:
    inputs:
      messages_json:
        description: "Conversation messages as JSON array"
        required: true
        type: string

      model:
        description: "AI Model"
        required: false
        default: "openai"
        type: choice
        options:
          - openai
          - mistral
          - llama
          - claude

      system_message:
        description: "System message"
        required: false
        default: "You are a helpful, friendly AI assistant. Respond in the same language the user writes in."
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  chat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "🤖 Generate Response"
        id: respond
        env:
          MESSAGES_JSON: ${{ github.event.inputs.messages_json }}
          MODEL: ${{ github.event.inputs.model }}
          SYSTEM_MESSAGE: ${{ github.event.inputs.system_message }}
        shell: bash
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import os
          import sys
          import time

          messages_json = os.environ.get("MESSAGES_JSON", "[]")
          model = os.environ.get("MODEL", "openai")
          system_msg = os.environ.get("SYSTEM_MESSAGE", "You are a helpful assistant.")

          # Parse messages
          try:
              messages = json.loads(messages_json)
              if not isinstance(messages, list):
                  messages = [{"role": "user", "content": str(messages)}]
          except json.JSONDecodeError as e:
              with open("response.txt", "w") as f:
                  f.write(f"JSON Parse Error: {e}")
              sys.exit(0)

          # Build full message array
          full_messages = [{"role": "system", "content": system_msg}]
          for m in messages:
              if m.get("role") in ("user", "assistant") and m.get("content"):
                  full_messages.append(m)

          # Build request
          payload = json.dumps({
              "messages": full_messages,
              "model": model,
              "temperature": 0.7
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://text.pollinations.ai/",
              data=payload,
              method="POST"
          )
          req.add_header("Content-Type", "application/json")
          req.add_header("User-Agent", "AI-Melli/1.0")

          start = time.time()
          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  raw = resp.read().decode("utf-8")
          except Exception as e:
              with open("response.txt", "w") as f:
                  f.write(f"API Connection Error: {e}")
              sys.exit(0)

          elapsed = time.time() - start

          # Parse response
          try:
              parsed = json.loads(raw)
              if isinstance(parsed, dict):
                  text = parsed.get("choices", [{}])[0].get("message", {}).get("content", "")
                  if not text:
                      text = parsed.get("content", "")
                  if not text:
                      text = json.dumps(parsed, ensure_ascii=False)
              elif isinstance(parsed, str):
                  text = parsed
              else:
                  text = str(parsed)
          except (json.JSONDecodeError, IndexError, KeyError):
              text = raw

          # Save response
          with open("response.txt", "w", encoding="utf-8") as f:
              f.write(text)

          print(f"Response: {len(text)} chars in {elapsed:.1f}s")
          PYEOF

      - name: "📤 Upload Response"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-response
          path: response.txt
          retention-days: 1
          if-no-files-found: warn
