# ============================================================
# 💬 AI Melli — Chat via GitHub Actions
# ============================================================
# این ورک‌فلو توسط اسکریپت chat.py فراخوانی می‌شه
# کاربر پیام رو می‌فرسته، ورک‌فلو جواب AI رو تولید می‌کنه
# ============================================================

name: "💬 AI Chat"

on:
  workflow_dispatch:
    inputs:
      messages_json:
        description: "Conversation messages as JSON array"
        required: true
        type: string

      model:
        description: "AI Model"
        required: false
        default: "openai"
        type: choice
        options:
          - openai
          - mistral
          - llama
          - claude

      system_message:
        description: "System message"
        required: false
        default: "You are a helpful, friendly AI assistant. Respond in the same language the user writes in."
        type: string

jobs:
  chat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "🤖 Generate Response"
        id: respond
        shell: python3 {0}
        run: |
          import urllib.request
          import json
          import os
          import sys
          import time

          messages_json = os.environ["MESSAGES_JSON"]
          model = os.environ["MODEL"]
          system_msg = os.environ["SYSTEM_MESSAGE"]

          # Parse messages
          try:
              messages = json.loads(messages_json)
          except json.JSONDecodeError as e:
              with open("response.txt", "w") as f:
                  f.write(f"JSON Error: {e}")
              sys.exit(1)

          # Ensure system message is first
          if not messages or messages[0].get("role") != "system":
              messages.insert(0, {"role": "system", "content": system_msg})
          else:
              messages[0]["content"] = system_msg

          # Build request
          payload = json.dumps({
              "messages": messages,
              "model": model,
              "temperature": 0.7
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://text.pollinations.ai/",
              data=payload,
              method="POST"
          )
          req.add_header("Content-Type", "application/json")
          req.add_header("User-Agent", "AI-Melli/1.0")

          start = time.time()
          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  raw = resp.read().decode("utf-8")
          except Exception as e:
              with open("response.txt", "w") as f:
                  f.write(f"Connection Error: {e}")
              sys.exit(1)

          elapsed = time.time() - start

          # Parse response
          try:
              parsed = json.loads(raw)
              if isinstance(parsed, dict):
                  text = (
                      parsed
                      .get("choices", [{}])[0]
                      .get("message", {})
                      .get("content", "")
                  )
                  if not text:
                      text = parsed.get("content", "")
                  if not text:
                      text = json.dumps(parsed, ensure_ascii=False)
              elif isinstance(parsed, str):
                  text = parsed
              else:
                  text = str(parsed)
          except (json.JSONDecodeError, IndexError, KeyError):
              text = raw

          # Save response
          with open("response.txt", "w", encoding="utf-8") as f:
              f.write(text)

          print(f"Response generated in {elapsed:.1f}s")
          print(f"Length: {len(text)} chars")

      - name: "📤 Upload Response"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-response
          path: response.txt
          retention-days: 1
