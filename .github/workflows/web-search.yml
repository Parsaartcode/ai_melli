# ============================================================
# 🔍 AI Melli — Web Search
# ============================================================

name: "🔍 Web Search"

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Search query (English or Persian)"
        required: true
        type: string

      num_results:
        description: "Number of results (1-20)"
        required: false
        default: "10"
        type: string

      search_type:
        description: "Search type"
        required: true
        default: "general"
        type: choice
        options:
          - general
          - news
          - images
          - videos

      safe_search:
        description: "Safe search"
        required: false
        default: "moderate"
        type: choice
        options:
          - "off"
          - moderate
          - strict

      language:
        description: "Search language"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - en
          - fa
          - ar
          - fr
          - de
          - es
          - zh
          - ja

      region:
        description: "Region for results"
        required: false
        default: "wt-wt"
        type: choice
        options:
          - wt-wt
          - us-en
          - uk-en
          - ir-fa
          - fr-fr
          - de-de
          - jp-jp

      deep_search:
        description: "Deep search (AI-enhanced detailed analysis)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      include_ai_summary:
        description: "Include AI summary of results"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      upload_method:
        description: "Upload Method"
        required: true
        default: "repository"
        type: choice
        options:
          - repository
          - release

      release_tag:
        description: "Release Tag (empty = auto)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "🐍 Install dependencies"
        shell: bash
        run: |
          pip install duckduckgo-search 2>/dev/null || pip3 install duckduckgo-search

      - name: "📁 Prepare scripts"
        shell: bash
        run: mkdir -p scripts output

      - name: "🐍 Create web search script"
        shell: bash
        run: |
          cat > scripts/web_search.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          AI Melli — Web Search Engine
          Powered by DuckDuckGo (no API key needed)
          """
          import json, sys, os, time, re
          from datetime import datetime, timezone, timedelta

          try:
              from duckduckgo_search import DDGS
          except ImportError:
              print("ERROR: duckduckgo-search not installed!")
              sys.exit(1)

          def clean_text(text):
              """Remove HTML tags and extra whitespace."""
              text = re.sub(r'<[^>]+>', '', str(text))
              text = re.sub(r'\s+', ' ', text).strip()
              return text

          def search_general(ddgs, query, max_results, region, safe):
              """General web search."""
              results = []
              for r in ddgs.text(query, max_results=max_results, region=region, safesearch=safe):
                  results.append({
                      "title": clean_text(r.get("title", "")),
                      "url": r.get("href", ""),
                      "description": clean_text(r.get("body", "")),
                      "type": "general"
                  })
              return results

          def search_news(ddgs, query, max_results, region, safe):
              """News search."""
              results = []
              for r in ddgs.news(query, max_results=max_results, region=region, safesearch=safe):
                  results.append({
                      "title": clean_text(r.get("title", "")),
                      "url": r.get("url", ""),
                      "description": clean_text(r.get("body", "")),
                      "source": r.get("source", ""),
                      "date": r.get("date", ""),
                      "type": "news"
                  })
              return results

          def search_images(ddgs, query, max_results, region, safe):
              """Image search."""
              results = []
              for r in ddgs.images(query, max_results=max_results, region=region, safesearch=safe):
                  results.append({
                      "title": clean_text(r.get("title", "")),
                      "url": r.get("url", ""),
                      "thumbnail": r.get("thumbnail", ""),
                      "image": r.get("image", ""),
                      "source": r.get("source", ""),
                      "width": r.get("width", ""),
                      "height": r.get("height", ""),
                      "type": "image"
                  })
              return results

          def search_videos(ddgs, query, max_results, region, safe):
              """Video search."""
              results = []
              for r in ddgs.videos(query, max_results=max_results, region=region, safesearch=safe):
                  results.append({
                      "title": clean_text(r.get("title", "")),
                      "url": r.get("url", ""),
                      "description": clean_text(r.get("description", "")),
                      "duration": r.get("duration", ""),
                      "publisher": r.get("publisher", ""),
                      "type": "video"
                  })
              return results

          def format_results_markdown(results, query, search_type, lang):
              """Format results as markdown."""
              now = datetime.now(timezone(timedelta(hours=3, minutes=30)))
              ts = now.strftime("%Y-%m-%d %H:%M:%S")
              
              type_labels = {
                  "general": "Web Search",
                  "news": "News Search",
                  "images": "Image Search",
                  "videos": "Video Search"
              }
              
              md = f"# Search Results\n\n"
              md += f"| Key | Value |\n|-----|-------|\n"
              md += f"| **Query** | {query} |\n"
              md += f"| **Type** | {type_labels.get(search_type, search_type)} |\n"
              md += f"| **Results** | {len(results)} |\n"
              md += f"| **Date** | {ts} (Asia/Tehran) |\n\n"
              md += "---\n\n"
              
              if not results:
                  md += "> No results found. Try a different query.\n"
                  return md
              
              for i, r in enumerate(results, 1):
                  md += f"## {i}. {r['title']}\n\n"
                  
                  if r.get('url'):
                      md += f"**URL:** [{r['url']}]({r['url']})\n\n"
                  
                  if r.get('description'):
                      md += f"{r['description']}\n\n"
                  
                  # Extra fields based on type
                  if r.get('source'):
                      md += f"*Source: {r['source']}*"
                      if r.get('date'):
                          md += f" | *Date: {r['date']}*"
                      md += "\n\n"
                  
                  if r.get('duration'):
                      md += f"*Duration: {r['duration']}*\n\n"
                  
                  if r.get('publisher'):
                      md += f"*Publisher: {r['publisher']}*\n\n"
                  
                  if r.get('thumbnail') and r.get('image'):
                      md += f"[![image]({r['thumbnail']})]({r['image']})\n\n"
                  
                  if r.get('width') and r.get('height'):
                      md += f"*Resolution: {r['width']}x{r['height']}*\n\n"
                  
                  md += "---\n\n"
              
              return md

          def generate_ai_summary(results, query):
              """Generate AI summary of search results."""
              if not results:
                  return ""
              try:
                  import urllib.request
                  titles_and_desc = []
                  for r in results[:5]:
                      t = r.get("title", "")
                      d = r.get("description", "")[:200]
                      titles_and_desc.append(f"- {t}: {d}")
                  context = "\n".join(titles_and_desc)
                  
                  prompt = f"""Based on these search results for "{query}", provide a concise summary in 3-5 bullet points. 
          Use the same language as the query. If the query is in Persian/Farsi, respond in Persian.

          Search Results:
          {context}

          Summary:"""
                  
                  payload = json.dumps({
                      "messages": [
                          {"role": "system", "content": "You are a helpful search assistant. Summarize search results concisely. Always respond in the same language as the user's query."},
                          {"role": "user", "content": prompt}
                      ],
                      "model": "openai",
                      "temperature": 0.3
                  }).encode("utf-8")
                  
                  req = urllib.request.Request("https://text.pollinations.ai/", data=payload, method="POST")
                  req.add_header("Content-Type", "application/json")
                  req.add_header("User-Agent", "AI-Melli/1.0")
                  
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      raw = resp.read().decode("utf-8")
                  
                  try:
                      parsed = json.loads(raw)
                      if isinstance(parsed, dict):
                          return parsed.get("choices", [{}])[0].get("message", {}).get("content", "")
                      return str(parsed)
                  except:
                      return raw
              except Exception as e:
                  return f"(AI summary unavailable: {str(e)[:100]})"

          def main():
              config_path = sys.argv[1] if len(sys.argv) > 1 else "/tmp/ai_melli_config.json"
              with open(config_path) as f:
                  cfg = json.load(f)
              
              query = cfg["query"]
              max_results = min(int(cfg.get("num_results", "10")), 20)
              search_type = cfg.get("search_type", "general")
              safe = cfg.get("safe_search", "moderate")
              lang = cfg.get("language", "auto")
              region = cfg.get("region", "wt-wt")
              deep = cfg.get("deep_search", "false").lower() == "true"
              ai_summary = cfg.get("include_ai_summary", "true").lower() == "true"
              out_dir = cfg.get("output_dir", "output")
              os.makedirs(out_dir, exist_ok=True)
              
              if deep:
                  max_results = min(max_results * 3, 50)
              
              # Map language to region
              lang_region_map = {
                  "fa": "ir-fa",
                  "en": "wt-wt",
                  "ar": "sa-ar",
                  "fr": "fr-fr",
                  "de": "de-de",
                  "es": "es-es",
                  "zh": "cn-zh",
                  "ja": "jp-jp"
              }
              if lang != "auto":
                  region = lang_region_map.get(lang, region)
              
              print(f"Query: {query}")
              print(f"Type: {search_type}")
              print(f"Results: {max_results}")
              print(f"Region: {region}")
              print(f"Deep: {deep}")
              print(f"AI Summary: {ai_summary}")
              
              # Search
              results = []
              with DDGS() as ddgs:
                  if search_type == "general":
                      results = search_general(ddgs, query, max_results, region, safe)
                  elif search_type == "news":
                      results = search_news(ddgs, query, max_results, region, safe)
                  elif search_type == "images":
                      results = search_images(ddgs, query, max_results, region, safe)
                  elif search_type == "videos":
                      results = search_videos(ddgs, query, max_results, region, safe)
              
              print(f"Found {len(results)} results")
              
              # Format
              md = format_results_markdown(results, query, search_type, lang)
              
              # AI Summary
              summary = ""
              if ai_summary and results:
                  print("Generating AI summary...")
                  summary = generate_ai_summary(results, query)
                  if summary:
                      md = f"## AI Summary\n\n{summary}\n\n---\n\n" + md
                      print(f"Summary: {summary[:100]}...")
              
              # Save markdown
              timestamp = time.strftime("%Y%m%d_%H%M%S")
              safe_q = "".join(c if c.isalnum() or c in "_-" else "_" for c in query[:40])
              md_path = os.path.join(out_dir, f"search_{safe_q}_{timestamp}.md")
              with open(md_path, "w", encoding="utf-8") as f:
                  f.write(md)
              
              # Save JSON
              json_path = os.path.join(out_dir, f"search_{safe_q}_{timestamp}.json")
              with open(json_path, "w", encoding="utf-8") as f:
                  json.dump({
                      "query": query,
                      "search_type": search_type,
                      "timestamp": timestamp,
                      "total_results": len(results),
                      "ai_summary": summary,
                      "results": results
                  }, f, ensure_ascii=False, indent=2)
              
              print(f"\n=== Search Complete ===")
              print(f"Results: {len(results)}")
              print(f"Markdown: {md_path}")
              print(f"JSON: {json_path}")
              
              with open("/tmp/ai_melli_result.json", "w") as f:
                  json.dump({
                      "total": len(results),
                      "md_file": md_path,
                      "json_file": json_path
                  }, f)

          if __name__ == "__main__":
              main()
          PYEOF

      # ======== Build Config & Run ========
      - name: "🔍 Search"
        id: search
        shell: bash
        run: |
          jq -n \
            --arg query "${{ github.event.inputs.query }}" \
            --arg num "${{ github.event.inputs.num_results }}" \
            --arg type "${{ github.event.inputs.search_type }}" \
            --arg safe "${{ github.event.inputs.safe_search }}" \
            --arg lang "${{ github.event.inputs.language }}" \
            --arg region "${{ github.event.inputs.region }}" \
            --arg deep "${{ github.event.inputs.deep_search }}" \
            --arg ai "${{ github.event.inputs.include_ai_summary }}" \
            --arg outdir "output" \
            '{
              query: $query,
              num_results: ($num | tonumber),
              search_type: $type,
              safe_search: $safe,
              language: $lang,
              region: $region,
              deep_search: $deep,
              include_ai_summary: $ai,
              output_dir: $outdir
            }' > /tmp/ai_melli_config.json

          echo "Config:"
          cat /tmp/ai_melli_config.json
          echo ""

          python3 scripts/web_search.py /tmp/ai_melli_config.json

          if [ -f /tmp/ai_melli_result.json ]; then
            echo "total=$(jq -r '.total' /tmp/ai_melli_result.json)" >> "$GITHUB_OUTPUT"
          fi

      # ======== Summary ========
      - name: "📊 Summary"
        if: always()
        shell: bash
        run: |
          echo "╔═══════════════════════════════════════╗"
          echo "║   Web Search — Complete                ║"
          echo "╠═══════════════════════════════════════╣"
          echo "║ Query    : ${{ github.event.inputs.query }}"
          echo "║ Type     : ${{ github.event.inputs.search_type }}"
          echo "║ Results  : ${{ steps.search.outputs.total }}"
          echo "║ AI Summ  : ${{ github.event.inputs.include_ai_summary }}"
          echo "╚═══════════════════════════════════════╝"

      # ======== Upload to Repository ========
      - name: "📦 Push to Repository"
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Search: ${{ github.event.inputs.query }} [skip ci]" || echo "No changes"
          git push

      # ======== Upload to Release ========
      - name: "🚀 Upload to Release"
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('search-{0}', github.run_number) }}
          name: "Search — ${{ github.event.inputs.query }}"
          body: |
            ## Web Search Results
            - **Query:** ${{ github.event.inputs.query }}
            - **Type:** ${{ github.event.inputs.search_type }}
            - **Results:** ${{ steps.search.outputs.total }}
            - **AI Summary:** ${{ github.event.inputs.include_ai_summary }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ======== Cleanup ========
      - name: "🧹 Cleanup"
        if: always()
        run: rm -rf output /tmp/ai_melli_*.json
